<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>常用标签示范</title>
</head>
<body>
<!-- 标题 -->
<h1>一级标题!</h1>
<h2>二级标题！</h2>
<h3>三级标题！</h3>

<!-- 段落 -->
<p>这是一个段落!</p>
<p>这是另一个段落，中间会自动有间距！</p>

<!-- div 容器 -->
<div style="border: 1px solid #ccc; padding: 10px;">
    <p>div里面的段落</p>
    <p>div可以包含多个元素</p>
</div>

<!-- span 行内容器 -->
<P>这是一段话，<span style="color:blue;">这是蓝色的部分</span></P>

<!-- 链接 -->

<a href="https://www.baidu.com" target="_blank">点击打开百度</a>

<!-- 图片 -->
<!-- <img src="photo.jpg" alt="照片" width="200"> -->

<!-- 按钮 -->
<button onclick="alert('你点击了按钮！')">点击我</button>

<!-- 列表 -->
<h3>无序列表</h3>
<ul>
    <li>java</li>
    <li>mysql</li>
    <li>spring boot</li>
</ul>

<h3>有序列表</h3>
<ol>
    <li>第一步：学习 HTML</li>
    <li>第二步：学习 CSS</li>
    <li>第三步：学习 JavaScript</li>
</ol>
</body>
</html>
