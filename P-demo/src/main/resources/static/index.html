<!DOCTYPE html>
<html>
<head>
    <title>用户管理系统</title>
    <meta charset="UTF-8">
    <style>
        /* 全局样式 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease;
        }

        /* 统计卡片 */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease;
        }
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label {
            color: #666;
            margin-top: 5px;
        }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease;
        }
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h2 .icon { font-size: 1.5em; }

        /* 输入框 */
        input {
            padding: 12px 15px;
            margin: 5px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            width: 180px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }

        /* 按钮 */
        button {
            padding: 12px 24px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:active { transform: translateY(0); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-danger { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }

        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        tr {
            transition: background 0.3s ease;
            animation: fadeIn 0.5s ease;
        }
        tr:hover { background: #f8f9ff; }
        .empty-row td {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideInRight 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .toast-success { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .toast-error { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .toast-info { background: linear-gradient(135deg, #667eea, #764ba2); }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        /* 搜索结果卡片 */
        .search-result {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 10px 10px 0;
            animation: fadeIn 0.5s ease;
        }
        .search-result p {
            margin: 5px 0;
            color: #555;
        }
        .search-result strong { color: #333; }

        /* 操作按钮组 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>用户管理系统</h1>

    <!-- 统计卡片 -->
    <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalCount">0</div>
            <div class="label">用户总数</div>
        </div>
        <div class="stat-card">
            <div class="number" id="lastAction">-</div>
            <div class="label">最近操作</div>
        </div>
        <div class="stat-card">
            <div class="number" id="status">就绪</div>
            <div class="label">系统状态</div>
        </div>
    </div>

    <!-- 用户列表 -->
    <div class="card">
        <h2><span class="icon">👥</span> 用户列表</h2>
        <div class="btn-group">
            <button class="btn-primary" onclick="loadUsers()">刷新列表</button>
        </div>
        <div id="userTable">
            <table>
                <tr><th>ID</th><th>姓名</th><th>年龄</th><th>邮箱</th></tr>
                <tr class="empty-row"><td colspan="4">点击"刷新列表"加载数据</td></tr>
            </table>
        </div>
    </div>

    <!-- 添加用户 -->
    <div class="card">
        <h2><span class="icon">➕</span> 添加用户</h2>
        <div>
            <input type="text" id="addName" placeholder="姓名">
            <input type="text" id="addAge" placeholder="年龄">
            <input type="text" id="addEmail" placeholder="邮箱">
            <button class="btn-success" onclick="addUser()">添加用户</button>
        </div>
    </div>

    <!-- 查询操作 -->
    <div class="card">
        <h2><span class="icon">🔍</span> 查询用户</h2>
        <div>
            <input type="text" id="searchId" placeholder="输入用户 ID">
            <button class="btn-primary" onclick="findById()">按 ID 查询</button>
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="searchName" placeholder="输入用户名">
            <button class="btn-primary" onclick="findByName()">按名字搜索</button>
        </div>
        <div id="searchResult"></div>
    </div>

    <!-- 修改用户 -->
    <div class="card">
        <h2><span class="icon">✏️</span> 修改用户</h2>
        <div>
            <input type="text" id="updateId" placeholder="用户 ID">
            <input type="text" id="updateName" placeholder="新姓名">
            <input type="text" id="updateAge" placeholder="新年龄">
            <input type="text" id="updateEmail" placeholder="新邮箱">
            <button class="btn-warning" onclick="updateUser()">修改用户</button>
        </div>
    </div>

    <!-- 删除用户 -->
    <div class="card">
        <h2><span class="icon">🗑️</span> 删除用户</h2>
        <div>
            <input type="text" id="deleteId" placeholder="输入要删除的用户 ID">
            <button class="btn-danger" onclick="deleteUser()">删除用户</button>
        </div>
    </div>
</div>

<script>
    // ========================
    // Toast 通知
    // ========================
    function showToast(message, type) {
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function() {
            toast.remove();
        }, 3000);
    }

    // ========================
    // 更新统计卡片
    // ========================
    function updateStats(count, action) {
        document.getElementById('totalCount').textContent = count;
        document.getElementById('lastAction').textContent = action;
    }

    // ========================
    // 查询所有用户
    // ========================
    function loadUsers() {
        document.getElementById('status').textContent = '加载中...';

        fetch('/user/list')
            .then(function(response) { return response.json(); })
            .then(function(result) {
                if (result.code === 200) {
                    var users = result.data;
                    var html = '<table>';
                    html += '<tr><th>ID</th><th>姓名</th><th>年龄</th><th>邮箱</th></tr>';

                    if (users.length === 0) {
                        html += '<tr class="empty-row"><td colspan="4">暂无用户数据</td></tr>';
                    } else {
                        for (var i = 0; i < users.length; i++) {
                            html += '<tr>';
                            html += '<td>' + users[i].id + '</td>';
                            html += '<td>' + users[i].name + '</td>';
                            html += '<td>' + users[i].age + '</td>';
                            html += '<td>' + users[i].email + '</td>';
                            html += '</tr>';
                        }
                    }
                    html += '</table>';
                    document.getElementById('userTable').innerHTML = html;
                    updateStats(users.length, '查询列表');
                    document.getElementById('status').textContent = '就绪';
                    showToast('查询成功！共 ' + users.length + ' 个用户', 'success');
                } else {
                    showToast(result.msg, 'error');
                    document.getElementById('status').textContent = '错误';
                }
            })
            .catch(function(error) {
                showToast('请求失败：' + error, 'error');
                document.getElementById('status').textContent = '错误';
            });
    }

    // ========================
    // 根据 ID 查询
    // ========================
    function findById() {
        var id = document.getElementById('searchId').value;
        if (!id) { showToast('请输入用户 ID', 'error'); return; }

        document.getElementById('status').textContent = '查询中...';

        fetch('/user/' + id)
            .then(function(response) { return response.json(); })
            .then(function(result) {
                if (result.code === 200) {
                    var user = result.data;
                    var html = '<div class="search-result">';
                    html += '<p><strong>ID：</strong>' + user.id + '</p>';
                    html += '<p><strong>姓名：</strong>' + user.name + '</p>';
                    html += '<p><strong>年龄：</strong>' + user.age + '</p>';
                    html += '<p><strong>邮箱：</strong>' + user.email + '</p>';
                    html += '</div>';
                    document.getElementById('searchResult').innerHTML = html;
                    updateStats('-', '查询 ID:' + id);
                    document.getElementById('status').textContent = '就绪';
                    showToast('查询成功！', 'success');
                } else {
                    document.getElementById('searchResult').innerHTML = '<div class="search-result"><p style="color:#f45c43;">' + result.msg + '</p></div>';
                    document.getElementById('status').textContent = '就绪';
                    showToast(result.msg, 'error');
                }
            })
            .catch(function(error) {
                showToast('请求失败：' + error, 'error');
                document.getElementById('status').textContent = '错误';
            });
    }

    // ========================
    // 根据名字搜索
    // ========================
    function findByName() {
        var name = document.getElementById('searchName').value;
        if (!name) { showToast('请输入用户名', 'error'); return; }

        document.getElementById('status').textContent = '搜索中...';

        fetch('/user/search?name=' + encodeURIComponent(name))
            .then(function(response) { return response.json(); })
            .then(function(result) {
                if (result.code === 200) {
                    var users = result.data;
                    var html = '<div class="search-result">';
                    html += '<p><strong>搜索 "' + name + '" 找到 ' + users.length + ' 个用户：</strong></p>';
                    for (var i = 0; i < users.length; i++) {
                        html += '<p>' + users[i].id + '. ' + users[i].name + ' - ' + users[i].age + '岁 - ' + users[i].email + '</p>';
                    }
                    html += '</div>';
                    document.getElementById('searchResult').innerHTML = html;
                    updateStats('-', '搜索:' + name);
                    document.getElementById('status').textContent = '就绪';
                    showToast('搜索成功！找到 ' + users.length + ' 个用户', 'success');
                } else {
                    document.getElementById('searchResult').innerHTML = '<div class="search-result"><p style="color:#f45c43;">' + result.msg + '</p></div>';
                    document.getElementById('status').textContent = '就绪';
                    showToast(result.msg, 'error');
                }
            })
            .catch(function(error) {
                showToast('请求失败：' + error, 'error');
                document.getElementById('status').textContent = '错误';
            });
    }

    // ========================
    // 添加用户
    // ========================
    function addUser() {
        var name = document.getElementById('addName').value;
        var age = document.getElementById('addAge').value;
        var email = document.getElementById('addEmail').value;

        if (!name || !age || !email) { showToast('请填写完整信息', 'error'); return; }

        document.getElementById('status').textContent = '添加中...';

        fetch('/user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, age: parseInt(age), email: email })
        })
        .then(function(response) { return response.json(); })
        .then(function(result) {
            if (result.code === 200) {
                showToast('添加成功！', 'success');
                document.getElementById('addName').value = '';
                document.getElementById('addAge').value = '';
                document.getElementById('addEmail').value = '';
                loadUsers();
                updateStats(parseInt(document.getElementById('totalCount').textContent) + 1, '添加:' + name);
            } else {
                showToast(result.msg, 'error');
                document.getElementById('status').textContent = '就绪';
            }
        })
        .catch(function(error) {
            showToast('请求失败：' + error, 'error');
            document.getElementById('status').textContent = '错误';
        });
    }

    // ========================
    // 修改用户
    // ========================
    function updateUser() {
        var id = document.getElementById('updateId').value;
        var name = document.getElementById('updateName').value;
        var age = document.getElementById('updateAge').value;
        var email = document.getElementById('updateEmail').value;

        if (!id || !name || !age || !email) { showToast('请填写完整信息', 'error'); return; }

        document.getElementById('status').textContent = '修改中...';

        fetch('/user', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: parseInt(id), name: name, age: parseInt(age), email: email })
        })
        .then(function(response) { return response.json(); })
        .then(function(result) {
            if (result.code === 200) {
                showToast('修改成功！', 'success');
                document.getElementById('updateId').value = '';
                document.getElementById('updateName').value = '';
                document.getElementById('updateAge').value = '';
                document.getElementById('updateEmail').value = '';
                loadUsers();
                updateStats('-', '修改 ID:' + id);
            } else {
                showToast(result.msg, 'error');
                document.getElementById('status').textContent = '就绪';
            }
        })
        .catch(function(error) {
            showToast('请求失败：' + error, 'error');
            document.getElementById('status').textContent = '错误';
        });
    }

    // ========================
    // 删除用户
    // ========================
    function deleteUser() {
        var id = document.getElementById('deleteId').value;
        if (!id) { showToast('请输入要删除的用户 ID', 'error'); return; }

        if (!confirm('确定要删除 ID 为 ' + id + ' 的用户吗？')) return;

        document.getElementById('status').textContent = '删除中...';

        fetch('/user/' + id, { method: 'DELETE' })
        .then(function(response) { return response.json(); })
        .then(function(result) {
            if (result.code === 200) {
                showToast('删除成功！', 'success');
                document.getElementById('deleteId').value = '';
                loadUsers();
                updateStats(parseInt(document.getElementById('totalCount').textContent) - 1, '删除 ID:' + id);
            } else {
                showToast(result.msg, 'error');
                document.getElementById('status').textContent = '就绪';
            }
        })
        .catch(function(error) {
            showToast('请求失败：' + error, 'error');
            document.getElementById('status').textContent = '错误';
        });
    }

    // 页面加载时自动查询
    window.onload = function() {
        loadUsers();
    };
</script>

</body>
</html>
